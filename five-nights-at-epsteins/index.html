<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <style>
        html, body {
            padding: 0;
            margin: 0;
            background-color: #1f1f20;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #unity-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            background: #1f1f20;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        #unity-loading-bar {
            position: fixed;
            top: 45%; /* Iets hoger gezet voor betere optische centrering */
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 2147483647;
            width: 100vw;
        }

        #unity-logo {
            width: 154px;
            height: 110px;
            background: url('unity-logo-dark.png') no-repeat center;
            background-size: contain;
            margin-bottom: 20px;
        }

        #loading-text {
            font-size: 22px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 15px;
            color: rgba(255, 255, 255, .3);
            background: linear-gradient(to right, rgba(255, 255, 255, .3) 0, rgba(255, 255, 255, .9) 50%, rgba(255, 255, 255, .3) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s linear infinite;
        }

        #unity-progress-bar-empty {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, .1);
            border-radius: 10px;
            overflow: hidden;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #fff;
            transition: width .2s ease-out;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="loading-text">0%</div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>
    <script>
        (async () => {
            const loadingText = document.querySelector("#loading-text");
            const progressBarFull = document.querySelector("#unity-progress-bar-full");
            const canvas = document.querySelector("#unity-canvas");
            const loadingBar = document.querySelector("#unity-loading-bar");
            let loadedBytes = 0;
            const totalBytesEst = 155.84 * 1024 * 1024;

            async function fetchWithProgress(url) {
                const response = await fetch(url);
                const reader = response.body.getReader();
                let chunks = [];
                let received = 0;
                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    received += value.length;
                    loadedBytes += value.length;
                    chunks.push(value);
                    const percent = Math.min(Math.floor((loadedBytes / totalBytesEst) * 100), 100);
                    loadingText.textContent = `${percent}%`;
                }
                const fullBuffer = new Uint8Array(received);
                let offset = 0;
                for (const chunk of chunks) {
                    fullBuffer.set(chunk, offset);
                    offset += chunk.length;
                }
                return fullBuffer.buffer;
            }

            async function mergeFiles(fileParts) {
                const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
                return URL.createObjectURL(new Blob(buffers));
            }

            function getParts(file, start, end) {
                return Array.from({length: end - start + 1}, (_, i) => `${file}.part${start + i}`);
            }

            const [dataUrl, wasmUrl, webm] = await Promise.all([
                mergeFiles(getParts("Build/fnae.data", 1, 3)),
                mergeFiles(getParts("Build/fnae.wasm", 1, 3)),
                mergeFiles(getParts("StreamingAssets/202512191935.webm", 1, 3)),
            ]);

            window.randomwebm = webm;
            const realSrc = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, "src");
            Object.defineProperty(HTMLMediaElement.prototype, "src", {
                set(value) {
                    if (typeof value === "string" && (value.includes("202512191935.mp4") || value.includes("202512191935.webm"))) {
                        value = window.randomwebm;
                    }
                    return realSrc.set.call(this, value);
                },
                get() { return realSrc.get.call(this); }
            });

            const buildUrl = "Build";
            const config = {
                dataUrl: dataUrl,
                frameworkUrl: buildUrl + "/fnae.framework.js",
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "DefaultCompany",
                productName: "fnae",
                productVersion: "1.0",
                showBanner: () => {},
            };

            const script = document.createElement("script");
            script.src = buildUrl + "/fnae.loader.js";
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = (100 * progress) + "%";
                }).then(() => {
                    loadingBar.style.display = "none";
                }).catch(() => {});
            };
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
